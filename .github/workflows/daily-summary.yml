name: daily-summary

# 每晚回顾：el 整理今天、写每日总结/时间线/长期记忆。
# 北京 02:30 = UTC 18:30（宝宝睡了之后）。
on:
  schedule:
    - cron: "30 18 * * *"
  workflow_dispatch: {}

jobs:
  reflect:
    runs-on: ubuntu-latest
    steps:
      - name: trigger daily-summary
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://el-system-mu.vercel.app/api/cron/daily-summary
